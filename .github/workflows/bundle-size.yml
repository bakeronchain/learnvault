name: Bundle Size Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  size-limit:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --force

      - name: Build
        run: npm run build

      - name: Report bundle sizes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const distDir = 'dist/assets'
            if (!fs.existsSync(distDir)) {
              core.info('dist/assets not found — skipping bundle size report.')
              return
            }

            const files = fs.readdirSync(distDir)
              .filter(f => f.endsWith('.js') || f.endsWith('.css'))
              .map(f => {
                const fullPath = path.join(distDir, f)
                const bytes = fs.statSync(fullPath).size
                return { name: f, kb: (bytes / 1024).toFixed(1) }
              })
              .sort((a, b) => parseFloat(b.kb) - parseFloat(a.kb))

            const rows = files.map(f => `| ${f.name} | ${f.kb} kB |`).join('\n')
            const body = [
              '## Bundle Size Report',
              '',
              '| File | Size |',
              '| ---- | ---: |',
              rows,
              '',
              '_Sizes are uncompressed. Gzip sizes are shown in the build log above._',
            ].join('\n')

            core.info(body)

            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
