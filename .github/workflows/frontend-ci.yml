name: Frontend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"
      - "i18next-scanner.config.js"

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check translation keys
        run: |
          npx i18next-scanner \
            --config i18next-scanner.config.js \
            'src/**/*.{ts,tsx}' \
            '!src/**/*.test.{ts,tsx}' \
            '!src/locales/**'
          if grep -q '"__MISSING__"' src/locales/en.json; then
            echo "❌ Missing translation keys found in en.json"
            grep -n '"__MISSING__"' src/locales/en.json
            exit 1
          fi
          echo "✅ All translation keys are present"

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true

      - name: Build
        run: npm run build