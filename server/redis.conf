# Redis configuration for LearnVault
# This configuration is optimized for caching and nonce storage use cases

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Persistence (disabled for cache use case - data can be lost)
save ""

# Network
timeout 300
tcp-keepalive 300

# Security
protected-mode yes
bind 0.0.0.0

# Performance
tcp-backlog 511
databases 16

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_REDIS